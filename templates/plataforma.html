<!doctype html>
<html lang="es">
<head>
    {% load static %}
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title> {% block title %} AC Sport — Plataforma {% endblock %} </title>
    <link rel="stylesheet" href="{% static 'css/plataforma.css' %}">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23001f3f%22/><circle cx=%2250%22 cy=%2250%22 r=%2235%22 fill=%22none%22 stroke=%22%23ff851b%22 stroke-width=%228%22/><path d=%22M30 50 L70 50 M50 30 L50 70%22 stroke=%22%23ffffff%22 stroke-width=%224%22 stroke-linecap=%22round%22/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div id="app">
        <div class="card" role="application" aria-label="Plataforma Torneo Charalá">
            {% include 'header.html' %}
            
            <div class="layout">
                {% if request.user.is_staff %}
                    {% include 'sidebarorganizador.html' %}
                {% else %}
                    {% include 'sidebar.html' %}
                {% endif %}
                <main class="app-main">
                    <div class="main-container-fluid">
                        {% block content %}
                        {% endblock %}
                    </div>
                </main>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="{% static 'js/plataforma.js' %}"></script>

</body>
</html>
