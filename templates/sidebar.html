<!-- SIDEBAR -->

{% load static %}

<nav class="sidebar" aria-label="Navegación principal">
    <div class="user-row">
        <div class="avatar"> 
            {% if request.user.foto %}
                <img src="{{ request.user.foto.url }}" alt="Avatar" style="width:100%; border-radius:10px;">
            {% else %}
                <img src="{% static 'img/sin-foto.jpg' %}" alt="avatar" style="width:100%; border-radius:10px;">
                <!-- {{ request.user.first_name|slice:":1" }}{{ request.user.last_name|slice:":1" }} -->
            {% endif %}
        </div>
        <div class="user-info">
            <div class="name"> {{request.user.first_name|default:'Usuario'}} </div>
            <div class="meta"> {{request.user.equipos.municipio}} · Jugador</div>
        </div>
    </div>

    <div class="menu" role="menu">
        <a href="{% url 'Home:plataforma_inicio' %}" 
            class="menu-item {% if request.resolver_match.url_name == 'plataforma_inicio' %}active{% endif %}" role="menuitem">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1V9.5z" />
            </svg>
            <span>Inicio</span>
        </a>
        <a href="{% url 'usuario:miperfil' %}"
            class="menu-item {% if request.resolver_match.url_name == 'miperfil' %}active{% endif %}" role="menuitem">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <span> Mi perfil </span>
        </a>
        <a href="{% url 'miequipo:miequipo' %}" 
           class="menu-item {% if request.resolver_match.url_name == 'miequipo' %}active{% endif %}" role="menuitem">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-3-3.87"/><path d="M7 21v-2a4 4 0 0 1 3-3.87"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <span>Mi equipo</span>
        </a>
        <a href="{% url 'torneo:torneo' %}" 
           class="menu-item {% if request.resolver_match.url_name == 'torneo' %}active{% endif %}" role="menuitem">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 7V3h8v4"/><path d="M18 7a6 6 0 0 1-12 0"/>
            </svg>
            <span>Torneos</span>
        </a>
        <a href="#" class="menu-item" role="menuitem">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-6"/>
            </svg>
            <span>Estadísticas</span>
        </a>
        <hr class="menu-divider">

        <a href="{% url 'configuracion:configuracion' %}" 
           class="menu-item {% if request.resolver_match.url_name == 'configuracion' %}active{% endif %}" role="menuitem">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            <span>Configuración</span>
        </a>
    </div>
</nav>
